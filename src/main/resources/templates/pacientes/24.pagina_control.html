<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Controles</title>
    <script src="https://kit.fontawesome.com/14122cd484.js" crossorigin="anonymous"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
          rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/1.estilos_pagina_inicio.css}">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <link rel="stylesheet" th:href="@{/css/3.estilos_página_control.css}">
    <link rel="stylesheet" th:href="@{/css/estilos-form.css}">
</head>

<body>
<header th:insert="Layouts/header_footerPaciente :: header"></header>

<main class="cuerpo_indrugs">
    <div th:insert="Layouts/header_footerPaciente :: error"></div>
    <div class="contenido">
        <div th:if="${controles != null and !controles.isEmpty()}">
            <div class="table-container">
                <div class="table-header">
                    <h2 class="section-title">Control de Medicamentos</h2>
                </div>

                <div class="table-responsive">
                    <table id="tabla1" class="table custom-table">
                        <thead>
                        <tr>
                            <th>ID</th>
                            <th>Paciente</th>
                            <th>Inicio Tratamiento</th>
                            <th>Fin Tratamiento</th>
                            <th>Problema Salud</th>
                            <th>Cantidad Medic.</th>
                            <th>Frecuencia Medic.</th>
                            <th>Alarma</th>
                            <th>Nombre Medicamento</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr>
                        <tr th:each="control : ${controles}">
                            <td th:text="${control.idControl}"></td>
                            <td th:text="${control.nombreUsuario}"></td>
                            <td th:text="${#temporals.format(control.fechaInicioTratamiento, 'yyyy-MM-dd HH:mm')}"></td>
                            <td th:text="${#temporals.format(control.fechaFinTratamiento, 'yyyy-MM-dd HH:mm')}"></td>
                            <td th:text="${control.problemaSalud}"></td>
                            <td th:text="${control.cantidadMedic}"></td>
                            <td th:text="${control.frecuenciaMedic}"></td>
                            <td th:text="${control.alarmaControl}"></td>
                            <td th:text="${control.nombreMedicamento}"></td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <div th:if="${controles == null or controles.isEmpty()}">
            <p>No hay controles registrados.</p>
        </div>
        <div class="text-center me-3">
            <button type="button" class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#formModal">
                Nuevo control
            </button>
        </div>
        <div th:insert="Layouts/form_pacientes :: form_control"></div>

    </div>
</main>

<footer th:insert="Layouts/header_footerPaciente :: footer"></footer>
</body>
</html>
